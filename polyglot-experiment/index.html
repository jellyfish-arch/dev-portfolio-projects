<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Polyglot Experiment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e2e;
            color: #fff;
            text-align: center;
            padding: 40px;
        }
        h1 { color: #f38ba8; }
        .card {
            background: #313244;
            border-radius: 12px;
            padding: 20px;
            margin: 20px auto;
            max-width: 500px;
        }
        .lang { color: #89dceb; font-size: 1.2em; font-weight: bold; }
        .result { color: #a6e3a1; margin-top: 10px; }
    </style>
</head>
<body>
    <h1> My Polyglot Experiment </h1>
    <p> Same logic, different languages! </p>

    <div class="card">
        <div class="lang"> Python </div>
        <div class="result">Factorial of 5 : 120</div>
    </div>

    <div class="card">
        <div class="lang"> Java </div>
        <div class="result">Reversed: "Hello World" → "dlroW olleH"</div>
    </div>

    <div class="card">
        <div class="lang"> JavaScript </div>
        <div class="result" id="js-result"></div>
    </div>

    <script>
        // JavaScript Experiment - Palindrome Checker
        function isPalindrome(str) {
            const reversed = str.split("").reverse().join("");
            return str === reversed;
        }

        const word = "racecar";
        const result = isPalindrome(word);
        document.getElementById("js-result").innerText = 
            `Palindrome Check: "${word}" is ${result ? "a Palindrome!" : "not a Palindrome!"}`;
    </script>
</body>
</html>
